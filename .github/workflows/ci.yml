name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}

      - name: pip-compile consistency
        run: |
          pip install pip-tools
          pip-compile --dry-run requirements.in
          pip-compile --dry-run requirements-dev.in

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image
        run: docker build --target test -t app:test .

      - name: Run pytest
        run: >
          docker run
          --env DJANGO_SETTINGS_MODULE=config.settings.development
          --env SECRET_KEY=test-secret-for-ci-at-least-32-bytes-required
          app:test
          pytest -v
