name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: docker build -f infra/docker/Dockerfile -t app:latest .

      - name: Django check (root)
        run: docker run --rm -e DJANGO_SETTINGS_MODULE=root.settings app:latest python services/root/manage.py check
      - name: Django check (legislative)
        run: docker run --rm -e DJANGO_SETTINGS_MODULE=legislative.settings app:latest python services/legislative/manage.py check
      - name: Django check (judiciary)
        run: docker run --rm -e DJANGO_SETTINGS_MODULE=judiciary.settings app:latest python services/judiciary/manage.py check
      - name: Django check (executive)
        run: docker run --rm -e DJANGO_SETTINGS_MODULE=executive.settings app:latest python services/executive/manage.py check

      - name: Run pytest (root)
        run: docker run --rm -e DJANGO_SETTINGS_MODULE=root.settings app:latest pytest services/root/tests/ -v
      - name: Run pytest (legislative)
        run: docker run --rm -e DJANGO_SETTINGS_MODULE=legislative.settings app:latest pytest services/legislative/tests/ -v
      - name: Run pytest (proposals)
        run: docker run --rm -e DJANGO_SETTINGS_MODULE=legislative.settings app:latest pytest shared/proposals/tests/ -v
      - name: Run pytest (executive)
        run: docker run --rm -e DJANGO_SETTINGS_MODULE=executive.settings app:latest pytest services/executive/tests/ -v
