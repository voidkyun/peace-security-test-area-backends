# prod: コンテナ起動時に gunicorn で WSGI サーバーを起動（runserver は開発用のため本番では使わない）
# 利用例: docker compose -f docker-compose.yml -f docker-compose.prod.yml up
# 本番では ALLOWED_HOSTS を環境変数で設定すること（各 services/*/settings/prod.py で必須）
services:
  root:
    environment:
      DJANGO_SETTINGS_MODULE: root.settings.prod
    command: ["sh", "-c", "PYTHONPATH=/app/services/root exec gunicorn root.wsgi:application --bind 0.0.0.0:8080"]
  legislative:
    environment:
      DJANGO_SETTINGS_MODULE: legislative.settings.prod
    command: ["sh", "-c", "PYTHONPATH=/app/services/legislative exec gunicorn legislative.wsgi:application --bind 0.0.0.0:8080"]
  judiciary:
    environment:
      DJANGO_SETTINGS_MODULE: judiciary.settings.prod
    command: ["sh", "-c", "PYTHONPATH=/app/services/judiciary exec gunicorn judiciary.wsgi:application --bind 0.0.0.0:8080"]
  executive:
    environment:
      DJANGO_SETTINGS_MODULE: executive.settings.prod
    command: ["sh", "-c", "PYTHONPATH=/app/services/executive exec gunicorn executive.wsgi:application --bind 0.0.0.0:8080"]
