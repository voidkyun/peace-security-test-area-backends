# モノレポ 4 Django サービス（dev: コンテナ起動時は runserver しない）
# コンテナ内で bash してマイグレーション・runserver などを実行する想定
# 各サービスにホストポートを割り当て（admin 等を触るとき用）。8000 は他ライブラリ競合のため避け 8080 番台を使用
services:
  root:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    command: ["sleep", "infinity"]
    environment:
      DJANGO_SETTINGS_MODULE: root.settings
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-at-least-32-chars}
    ports:
      - "8080:8080"

  legislative:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    command: ["sleep", "infinity"]
    environment:
      DJANGO_SETTINGS_MODULE: legislative.settings
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-at-least-32-chars}
    ports:
      - "8081:8080"

  judiciary:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    command: ["sleep", "infinity"]
    environment:
      DJANGO_SETTINGS_MODULE: judiciary.settings
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-at-least-32-chars}
    ports:
      - "8082:8080"

  executive:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    command: ["sleep", "infinity"]
    environment:
      DJANGO_SETTINGS_MODULE: executive.settings
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-at-least-32-chars}
    ports:
      - "8083:8080"
